<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3440"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f5fa8"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #1f2430; }
      .area-title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #222836; }
      .box-title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #263042; }
      .text { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 15px; fill: #414856; }
      .legend { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 14px; fill: #303746; }
      .outer { fill: #f7f8fb; stroke: #c3ccdc; stroke-width: 2; rx: 12; }
      .game { fill: #eef8f2; stroke: #78ad88; stroke-width: 2; rx: 9; }
      .server { fill: #faf7ff; stroke: #9a8bd8; stroke-width: 2; rx: 9; }
      .model { fill: #eef5ff; stroke: #7e9ed7; stroke-width: 2; rx: 9; }
      .arrow { stroke: #2f3440; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2f5fa8; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke: #5b6270; stroke-width: 2.2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .num { fill: #2f3440; }
      .num-blue { fill: #2f5fa8; }
      .num-text { font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>
  <text x="700" y="50" text-anchor="middle" class="title">RimSpace 多智能体决策与执行流程</text>

  <rect x="60" y="92" width="300" height="610" class="outer"/>
  <rect x="480" y="92" width="440" height="610" class="outer"/>
  <rect x="1060" y="92" width="280" height="610" class="outer"/>

  <text x="210" y="130" text-anchor="middle" class="area-title">RimSpace 游戏环境</text>
  <text x="700" y="130" text-anchor="middle" class="area-title">AgentsServer 多智能体服务端</text>
  <text x="1200" y="130" text-anchor="middle" class="area-title">云端大语言模型</text>

  <rect x="100" y="168" width="220" height="82" class="game"/>
  <text x="210" y="199" text-anchor="middle" class="box-title">玩家任务与角色状态</text>
  <text x="210" y="225" text-anchor="middle" class="text">设施任务 / 库存 / Agent State</text>

  <rect x="100" y="350" width="220" height="82" class="game"/>
  <text x="210" y="381" text-anchor="middle" class="box-title">状态快照封装</text>
  <text x="210" y="407" text-anchor="middle" class="text">Environment + Character JSON</text>

  <rect x="100" y="578" width="220" height="82" class="game"/>
  <text x="210" y="609" text-anchor="middle" class="box-title">执行原子动作</text>
  <text x="210" y="635" text-anchor="middle" class="text">Move / Take / Put / Use / Wait</text>

  <rect x="560" y="155" width="280" height="72" class="server"/>
  <text x="700" y="184" text-anchor="middle" class="box-title">感知器 Perceiver</text>
  <text x="700" y="208" text-anchor="middle" class="text">解析状态，识别任务需求</text>

  <rect x="560" y="262" width="280" height="78" class="server"/>
  <text x="700" y="292" text-anchor="middle" class="box-title">共享黑板 Blackboard</text>
  <text x="700" y="317" text-anchor="middle" class="text">发布 / 去重 / 清理 / 技能过滤</text>

  <rect x="560" y="378" width="280" height="76" class="server"/>
  <text x="700" y="407" text-anchor="middle" class="box-title">角色决策 Agent</text>
  <text x="700" y="431" text-anchor="middle" class="text">整合状态、任务与反馈，生成意图</text>

  <rect x="560" y="508" width="280" height="78" class="server"/>
  <text x="700" y="538" text-anchor="middle" class="box-title">Planner</text>
  <text x="700" y="563" text-anchor="middle" class="text">任务拆解 / 动作序列化</text>

  <rect x="560" y="625" width="280" height="58" class="server"/>
  <text x="700" y="660" text-anchor="middle" class="box-title">动作队列 / Command JSON</text>

  <rect x="1110" y="310" width="180" height="92" class="model"/>
  <text x="1200" y="344" text-anchor="middle" class="box-title">LLM 推理</text>
  <text x="1200" y="372" text-anchor="middle" class="text">输出高层意图</text>

  <line x1="210" y1="250" x2="210" y2="345" class="arrow"/>
  <circle cx="210" cy="300" r="14" class="num"/><text x="210" y="300" class="num-text">1</text>

  <path d="M 320 391 L 555 191" class="arrow"/>
  <circle cx="438" cy="291" r="14" class="num"/><text x="438" y="291" class="num-text">2</text>

  <line x1="700" y1="227" x2="700" y2="257" class="arrow"/>
  <circle cx="735" cy="244" r="14" class="num"/><text x="735" y="244" class="num-text">3</text>

  <line x1="700" y1="340" x2="700" y2="373" class="arrow"/>
  <circle cx="735" cy="358" r="14" class="num"/><text x="735" y="358" class="num-text">4</text>

  <path d="M 840 398 C 930 300, 1015 300, 1105 336" class="arrow-blue"/>
  <circle cx="972" cy="314" r="14" class="num-blue"/><text x="972" y="314" class="num-text">5</text>

  <path d="M 1110 376 C 1012 486, 930 486, 845 430" class="dash"/>
  <circle cx="975" cy="477" r="14" class="num"/><text x="975" y="477" class="num-text">6</text>

  <line x1="700" y1="454" x2="700" y2="503" class="arrow"/>
  <circle cx="735" cy="481" r="14" class="num"/><text x="735" y="481" class="num-text">7</text>

  <path d="M 560 548 C 470 520, 470 303, 555 303" class="dash"/>
  <circle cx="493" cy="431" r="14" class="num"/><text x="493" y="431" class="num-text">8</text>

  <line x1="700" y1="586" x2="700" y2="620" class="arrow"/>
  <circle cx="735" cy="605" r="14" class="num"/><text x="735" y="605" class="num-text">9</text>

  <path d="M 560 654 C 460 654, 410 620, 325 620" class="arrow"/>
  <circle cx="442" cy="650" r="14" class="num"/><text x="442" y="650" class="num-text">10</text>

  <path d="M 210 578 C 80 510, 80 442, 210 432" class="arrow"/>
  <circle cx="85" cy="505" r="14" class="num"/><text x="85" y="505" class="num-text">11</text>

  <rect x="60" y="740" width="1280" height="120" fill="#fbfcff" stroke="#d4dae8" stroke-width="1.5" rx="8"/>
  <text x="86" y="772" class="legend">1  触发决策并封装状态快照</text>
  <text x="86" y="803" class="legend">2  通过 HTTP POST 向服务端发送状态快照</text>
  <text x="86" y="834" class="legend">3-4  感知器更新黑板，黑板筛选当前角色可执行任务</text>

  <text x="520" y="772" class="legend">5  构造 Prompt 并调用云端大语言模型</text>
  <text x="520" y="803" class="legend">6  大模型返回高层行为意图</text>
  <text x="520" y="834" class="legend">7-9  Planner 校验意图并生成动作队列</text>

  <text x="955" y="772" class="legend">8  资源不足时向黑板发布补充子任务</text>
  <text x="955" y="803" class="legend">10  返回 Command JSON 给游戏环境</text>
  <text x="955" y="834" class="legend">11  执行动作后更新世界状态，进入下一轮循环</text>
</svg>
