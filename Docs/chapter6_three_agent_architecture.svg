<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="840" viewBox="35 80 1430 840">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3340"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c62a6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7650"/>
    </marker>
    <style>
      .area-title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #273142; }
      .agent-title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #273142; }
      .box-title { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #273142; }
      .text { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 14px; fill: #424b5a; }
      .small { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 13px; fill: #596170; }
      .edge-label { font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #4b5565; }
      .server-area { fill: #faf8ff; stroke: #c5b9e8; stroke-width: 2; rx: 16; }
      .agent { fill: #ffffff; stroke-width: 2.2; rx: 14; }
      .farmer { stroke: #7dad73; }
      .chef { stroke: #d29563; }
      .crafter { stroke: #6f94c9; }
      .agent-head-farmer { fill: #eef8ec; stroke: #7dad73; stroke-width: 1.8; rx: 10; }
      .agent-head-chef { fill: #fff4e8; stroke: #d29563; stroke-width: 1.8; rx: 10; }
      .agent-head-crafter { fill: #eef5ff; stroke: #6f94c9; stroke-width: 1.8; rx: 10; }
      .module { fill: #f8fbff; stroke: #8aa6d8; stroke-width: 1.8; rx: 9; }
      .planner { fill: #fffaf0; stroke: #d3a65c; stroke-width: 1.8; rx: 9; }
      .queue { fill: #f5f6f8; stroke: #aab3c1; stroke-width: 1.5; rx: 8; }
      .perceiver { fill: #eff7ff; stroke: #6c9dd4; stroke-width: 2.5; rx: 13; }
      .blackboard { fill: #f3efff; stroke: #8f7ad8; stroke-width: 2.5; rx: 13; }
      .api { fill: #fff8ec; stroke: #d2a45d; stroke-width: 2.2; rx: 12; }
      .game { fill: #edf8f1; stroke: #78ad88; stroke-width: 2.5; rx: 13; }
      .arrow { stroke: #2d3340; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2c62a6; stroke-width: 2.2; fill: none; marker-end: url(#arrowBlue); }
      .arrow-green { stroke: #2e7650; stroke-width: 2.2; fill: none; marker-end: url(#arrowGreen); }
      .dash { stroke: #667085; stroke-width: 2; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="35" y="80" width="1430" height="840" fill="#ffffff"/>
  <rect x="55" y="105" width="1390" height="645" class="server-area"/>
  <text x="750" y="140" text-anchor="middle" class="area-title">AgentsServer 多智能体决策层</text>

  <rect x="110" y="170" width="360" height="360" class="agent farmer"/>
