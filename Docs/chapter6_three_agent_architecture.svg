  <rect x="640" y="485" width="220" height="30" class="queue"/>
  <text x="750" y="505" text-anchor="middle" class="small">Action Queue / Command JSON</text>

  <line x1="750" y1="356" x2="750" y2="389" class="arrow"/>
  <line x1="750" y1="464" x2="750" y2="480" class="arrow"/>

  <rect x="1030" y="170" width="360" height="360" class="agent crafter"/>
  <rect x="1055" y="194" width="310" height="62" class="agent-head-crafter"/>
  <text x="1210" y="220" text-anchor="middle" class="agent-title">工匠 Agent</text>

  <rect x="1070" y="286" width="280" height="70" class="module"/>
  <text x="1210" y="315" text-anchor="middle" class="box-title">LLM</text>

  <rect x="1070" y="394" width="280" height="70" class="planner"/>
  <text x="1210" y="423" text-anchor="middle" class="box-title">Planner 规划器</text>

  <rect x="1100" y="485" width="220" height="30" class="queue"/>
  <text x="1210" y="505" text-anchor="middle" class="small">Action Queue / Command JSON</text>

  <line x1="1210" y1="356" x2="1210" y2="389" class="arrow"/>
  <line x1="1210" y1="464" x2="1210" y2="480" class="arrow"/>

  <rect x="105" y="620" width="250" height="90" class="perceiver"/>
  <text x="230" y="672" text-anchor="middle" class="area-title">Perceiver 感知器</text>

  <rect x="430" y="610" width="660" height="120" class="blackboard"/>
  <text x="750" y="650" text-anchor="middle" class="area-title">黑板 Blackboard</text>

  <rect x="590" y="752" width="320" height="52" class="api"/>
  <text x="750" y="773" text-anchor="middle" class="box-title">Flask API</text>
  <text x="750" y="793" text-anchor="middle" class="text">/GetInstruction</text>

  <rect x="185" y="825" width="1130" height="72" class="game"/>
  <text x="750" y="856" text-anchor="middle" class="area-title">RimSpace 游戏环境</text>
  <text x="750" y="881" text-anchor="middle" class="text">Environment / Characters / Facilities / Inventory</text>

  <path d="M 290 530 C 290 572, 470 572, 555 610" class="arrow-blue"/>
  <text x="430" y="578" text-anchor="middle" class="edge-label">任务读写</text>
  <path d="M 750 530 L 750 605" class="arrow-blue"/>
  <text x="790" y="570" class="edge-label">任务读写</text>
  <path d="M 1210 530 C 1210 572, 1040 572, 965 610" class="arrow-blue"/>
