  <path d="M 180 515 C 80 610, 80 760, 585 778" class="arrow-green"/>
  <text x="230" y="755" text-anchor="middle" class="edge-label">Command JSON</text>
  <path d="M 860 515 C 1245 585, 1250 750, 915 778" class="arrow-green"/>
  <text x="1168" y="704" text-anchor="middle" class="edge-label">Command JSON</text>
  <path d="M 1320 515 C 1420 610, 1420 760, 915 778" class="arrow-green"/>
  <text x="1270" y="755" text-anchor="middle" class="edge-label">Command JSON</text>

  <path d="M 750 825 L 750 809" class="arrow-blue"/>
  <text x="775" y="821" class="edge-label">HTTP POST</text>
  <path d="M 590 778 C 380 780, 230 755, 230 715" class="arrow-blue"/>
  <text x="395" y="795" text-anchor="middle" class="edge-label">State JSON</text>
  <path d="M 355 665 L 425 665" class="arrow-blue"/>
  <text x="390" y="653" text-anchor="middle" class="edge-label">任务更新</text>

</svg>
